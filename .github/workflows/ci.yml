name: CI

on:
  pull_request:
    branches: [develop]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the code. Explicit here so the job
# never inherits a writable token (matters now that fork PRs can trigger it).
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: cd frontend && npm ci --ignore-scripts

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Typecheck backend
        run: cd backend && npm run typecheck

      - name: Typecheck frontend
        run: cd frontend && npm run typecheck

      # Build both packages so deploy-breaking errors that pass tsc + vitest
      # surface at PR time, not at Amplify/serverless deploy time (#543, #515).
      # Advisory on GitHub Free; the enforced copy lives in the tester +
      # qa-deploy gates (scripts/dummy-tester.sh, scripts/qa-deploy.sh).
      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Run backend tests
        run: cd backend && npm test

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --ignore-scripts

      - name: Run frontend tests
        run: cd frontend && npm test
