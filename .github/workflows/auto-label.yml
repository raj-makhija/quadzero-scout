name: Auto Label PRs

on:
  pull_request:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Label by branch prefix
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];
            if (branch.startsWith('feature/')) labels.push('feature');
            else if (branch.startsWith('bugfix/')) labels.push('bug');
            else if (branch.startsWith('hotfix/')) labels.push('hotfix');
            else if (branch.startsWith('docs/')) labels.push('docs');
            else if (branch.startsWith('refactor/')) labels.push('refactor');
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              });
            }
