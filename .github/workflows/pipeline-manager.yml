# Pipeline Manager -- drives one or more ticket transitions per Actions run.
#
# Triggers:
#   - cron every 5 min (safety net for missed events)
#   - issues.labeled                    (only fires on auto-pipeline label, see if-filter)
#   - repository_dispatch [pipeline-tick] (fired by human-driven scripts)
#   - workflow_dispatch                 (manual trigger, optional ticket override)
#
# The drain job has an if-filter so the issues.labeled trigger ONLY acts on
# the auto-pipeline label specifically. Other label adds (status:*,
# pipeline:*, type:*) made by our own scripts do NOT retrigger the manager.
# Schedule, workflow_dispatch, repository_dispatch always proceed.
#
# Auth:
#   - PIPELINE_TOKEN: classic PAT (repo + workflow + project) for gh ops
#   - CLAUDE_CODE_OAUTH_TOKEN: from `claude setup-token`; ties Claude usage
#     to the user's Pro/Max subscription. Use ANTHROPIC_API_KEY for API.

name: Pipeline Manager

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      ticket:
        description: 'Optional issue number; if set, advance only that ticket by ONE state'
        required: false
        type: string
  issues:
    types: [labeled]
  repository_dispatch:
    types: [pipeline-tick]

concurrency:
  group: pipeline-manager
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  drain:
    # Skip when triggered by an issues event for any label OTHER than auto-pipeline.
    # All other event types proceed unconditionally. Explicit per-event check
    # avoids null access on github.event.label for non-issues events.
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'auto-pipeline')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout develop (with PAT so later pushes work)
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.PIPELINE_TOKEN }}

      - name: Configure git identity for any pipeline commits
        run: |
          git config user.name  "quadzero-pipeline[bot]"
          git config user.email "pipeline-bot@users.noreply.github.com"

      - name: Disable husky hooks (lint/commitlint) for unattended runs
        run: git config core.hooksPath /dev/null

      - name: Verify gh + jq
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: |
          gh --version
          jq --version
          gh auth status

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Validate ticket types (flag tickets missing type:* before drain)
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: scripts/validate-ticket-types.sh

      - name: Drain the queue
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PIPELINE_DEVELOPER_AGENT: claude
          PIPELINE_PR_REVIEWER_AGENT: claude
          PIPELINE_TESTER_AGENT: claude
          PIPELINE_MAX_ATTEMPTS: '3'
          PIPELINE_MAX_STRIKES: '3'
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          # Note: pipefail off so a per-ticket manager.sh failure doesn't
          # bail the whole drain (the strike system below handles it).
          set -uo pipefail

          if [[ -n "${{ inputs.ticket }}" ]]; then
            echo "manager: single-step on requested ticket #${{ inputs.ticket }}"
            scripts/manager.sh "${{ inputs.ticket }}"
            exit 0
          fi

          # Tickets struck during this drain are excluded from subsequent
          # iterations -- otherwise next-ticket.sh keeps returning the
          # same failed ticket and we'd burn 25 strikes on it in one drain.
          # Cron retry semantics: one strike per cron tick, max.
          STRUCK_THIS_DRAIN=""

          for i in $(seq 1 25); do
            if [[ -n "$STRUCK_THIS_DRAIN" ]]; then
              NEXT="$(scripts/next-ticket.sh | grep -vE "^($STRUCK_THIS_DRAIN)\b" | head -1 | awk '{print $1}' || true)"
            else
              NEXT="$(scripts/next-ticket.sh | head -1 | awk '{print $1}' || true)"
            fi

            if [[ -z "$NEXT" ]]; then
              echo "manager: queue drained after $((i-1)) iterations"
              break
            fi

            echo "manager: iter $i, advancing #$NEXT"

            # Scale agent timeout by strike count so a ticket that timed out
            # on pass 1 gets a larger wall-clock budget on pass 2/3. Non-
            # timeout strikes fail fast and never consume the larger window,
            # so we scale unconditionally rather than gating on RC=124.
            # 0 strikes -> 600s, 1 -> 1200s, 2 -> 1800s.
            # `|| echo` keeps the substitution exit-0 when no struck-N
            # labels exist (grep -oE exits 1 on no match, which would
            # otherwise trip pipefail + the YAML-implicit set -e).
            STRIKES=$( (gh issue view "$NEXT" --json labels -q '.labels[].name' \
              | grep -oE 'pipeline:struck-[0-9]+' \
              | grep -oE '[0-9]+$' \
              | sort -nr | head -1) || echo 0 )
            STRIKES=${STRIKES:-0}
            export PIPELINE_AGENT_TIMEOUT_SEC=$((600 * (STRIKES + 1)))
            echo "manager: #$NEXT has $STRIKES prior strike(s); PIPELINE_AGENT_TIMEOUT_SEC=$PIPELINE_AGENT_TIMEOUT_SEC"

            if scripts/manager.sh; then
              # Successful advancement. Clear any prior strikes (no-op
              # if there were none) so transient failures don't keep
              # accumulating across long-lived tickets.
              scripts/clear-strikes.sh "$NEXT" || true
            else
              RC=$?
              echo "manager: #$NEXT advancement failed (exit $RC); striking"
              scripts/strike-ticket.sh "$NEXT" "manager.sh exit $RC at $(date -u +%Y-%m-%dT%H:%M:%SZ); see workflow run ${GH_RUN_ID}" || true
              STRUCK_THIS_DRAIN="${STRUCK_THIS_DRAIN:+$STRUCK_THIS_DRAIN|}${NEXT}"
            fi
            sleep 3
          done
