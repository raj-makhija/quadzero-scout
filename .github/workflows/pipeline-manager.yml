# Pipeline Manager — drives one or more ticket transitions per Actions run.
#
# Triggers:
#   - cron every 5 min (safety net for missed events)
#   - issues.labeled / opened           (kicks pipeline on new auto-pipeline tickets)
#   - repository_dispatch [pipeline-tick] (fired by human-driven scripts after they
#                                          touch ticket state, so the pipeline can
#                                          react in seconds instead of waiting for cron)
#   - workflow_dispatch                 (manual trigger, optional ticket override)
#
# Each run drains the queue: it loops calling manager.sh while next-ticket.sh
# returns something. One Actions run takes a fresh ticket from new all the way
# to merged-to-develop in one go. Loop bounded by iteration count + timeout-minutes.
#
# Kill-switch: disable the workflow in the Actions UI.
# Auth: PIPELINE_TOKEN classic PAT (repo + workflow + project scopes).
# Real developer agent: ANTHROPIC_API_KEY + PIPELINE_DEVELOPER_AGENT=claude.

name: Pipeline Manager

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      ticket:
        description: 'Optional issue number; if set, advance only that ticket by ONE state'
        required: false
        type: string
  issues:
    types: [labeled, opened]
  repository_dispatch:
    types: [pipeline-tick]

concurrency:
  group: pipeline-manager
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout develop (with PAT so later pushes work)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.PIPELINE_TOKEN }}

      - name: Configure git identity for any pipeline commits
        run: |
          git config user.name  "quadzero-pipeline[bot]"
          git config user.email "pipeline-bot@users.noreply.github.com"

      - name: Disable husky hooks (lint/commitlint) for unattended runs
        run: git config core.hooksPath /dev/null

      - name: Verify gh + jq
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: |
          gh --version
          jq --version
          gh auth status

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Drain the queue
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PIPELINE_DEVELOPER_AGENT: claude
          PIPELINE_MAX_ATTEMPTS: '3'
        run: |
          set -euo pipefail

          if [[ -n "${{ inputs.ticket }}" ]]; then
            echo "manager: single-step on requested ticket #${{ inputs.ticket }}"
            scripts/manager.sh "${{ inputs.ticket }}"
            exit 0
          fi

          for i in $(seq 1 25); do
            NEXT="$(scripts/next-ticket.sh | head -1 | awk '{print $1}' || true)"
            if [[ -z "$NEXT" ]]; then
              echo "manager: queue drained after $((i-1)) iterations"
              break
            fi
            echo "manager: iter $i, advancing #$NEXT"
            scripts/manager.sh
            sleep 3
          done
