# Pipeline Manager -- drives one or more ticket transitions per Actions run.
#
# Triggers:
#   - cron every 5 min (safety net for missed events)
#   - issues.labeled                    (all label events; guard step exits early for non-pipeline labels)
#   - repository_dispatch [pipeline-tick] (fired by human-driven scripts)
#   - workflow_dispatch                 (manual trigger, optional ticket override)
#
# A label guard step at the top of drain short-circuits any issues.labeled
# event whose label is not 'auto-pipeline' or 'pipeline:struck-*'.
# Schedule, workflow_dispatch, repository_dispatch always proceed past the guard.
#
# Auth:
#   - PIPELINE_TOKEN: classic PAT (repo + workflow + project) for gh ops
#   - CLAUDE_CODE_OAUTH_TOKEN: from `claude setup-token`; ties Claude usage
#     to the user's Pro/Max subscription. Use ANTHROPIC_API_KEY for API.

name: Pipeline Manager

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      ticket:
        description: 'Optional issue number; if set, advance only that ticket by ONE state'
        required: false
        type: string
  issues:
    types: [labeled]
  repository_dispatch:
    types: [pipeline-tick]

concurrency:
  group: pipeline-manager
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Label guard -- short-circuit non-pipeline label triggers
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            LABEL="${{ github.event.label.name }}"
            if [[ "$LABEL" != "auto-pipeline" && ! "$LABEL" =~ ^pipeline:struck-[0-9]+$ ]]; then
              echo "Skipping: triggered by label '$LABEL'; only 'auto-pipeline' and 'pipeline:struck-*' drive the pipeline."
              echo "LABEL_GUARD_SKIP=true" >> "$GITHUB_ENV"
            fi
          fi

      - name: Checkout develop (with PAT so later pushes work)
        if: env.LABEL_GUARD_SKIP != 'true'
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.PIPELINE_TOKEN }}

      - name: Configure git identity for any pipeline commits
        if: env.LABEL_GUARD_SKIP != 'true'
        run: |
          git config user.name  "quadzero-pipeline[bot]"
          git config user.email "pipeline-bot@users.noreply.github.com"

      - name: Disable husky hooks (lint/commitlint) for unattended runs
        if: env.LABEL_GUARD_SKIP != 'true'
        run: git config core.hooksPath /dev/null

      - name: Verify gh + jq
        if: env.LABEL_GUARD_SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: |
          gh --version
          jq --version
          gh auth status

      - name: Install Claude Code CLI
        if: env.LABEL_GUARD_SKIP != 'true'
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Validate ticket types (flag tickets missing type:* before drain)
        if: env.LABEL_GUARD_SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: scripts/validate-ticket-types.sh

      - name: Drain the queue
        if: env.LABEL_GUARD_SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PIPELINE_DEVELOPER_AGENT: claude
          PIPELINE_PR_REVIEWER_AGENT: claude
          PIPELINE_TESTER_AGENT: claude
          PIPELINE_MAX_ATTEMPTS: '5'
          PIPELINE_MAX_STRIKES: '3'
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          # Note: pipefail off so a per-ticket manager.sh failure doesn't
          # bail the whole drain (the strike system below handles it).
          set -uo pipefail

          if [[ -n "${{ inputs.ticket }}" ]]; then
            echo "manager: single-step on requested ticket #${{ inputs.ticket }}"
            scripts/manager.sh "${{ inputs.ticket }}"
            exit 0
          fi

          # Tickets struck during this drain are excluded from subsequent
          # iterations -- otherwise next-ticket.sh keeps returning the
          # same failed ticket and we'd burn 25 strikes on it in one drain.
          # Cron retry semantics: one strike per cron tick, max.
          STRUCK_THIS_DRAIN=""

          # Aggregate wall-clock budget for the whole drain, kept below the
          # job's timeout-minutes (30 = 1800s) so the loop exits cleanly --
          # running its strike/clear-strikes/tree-reset logic and releasing
          # the concurrency lock -- instead of being cancelled mid-agent when
          # the job timeout fires. Leftover tickets are picked up by the next
          # 5-min cron tick. SECONDS counts from the start of this step's shell.
          DRAIN_BUDGET_SEC=1620

          for i in $(seq 1 25); do
            if [[ -n "$STRUCK_THIS_DRAIN" ]]; then
              NEXT="$(scripts/next-ticket.sh | grep -vE "^($STRUCK_THIS_DRAIN)\b" | head -1 | awk '{print $1}' || true)"
            else
              NEXT="$(scripts/next-ticket.sh | head -1 | awk '{print $1}' || true)"
            fi

            if [[ -z "$NEXT" ]]; then
              echo "manager: queue drained after $((i-1)) iterations"
              break
            fi

            echo "manager: iter $i, advancing #$NEXT"

            # Scale agent timeout by strike count so a ticket that timed out
            # on pass 1 gets a larger wall-clock budget on pass 2/3. Non-
            # timeout strikes fail fast and never consume the larger window,
            # so we scale unconditionally rather than gating on RC=124.
            # 0 strikes -> 600s, 1 -> 1200s, 2 -> 1800s.
            # `|| echo` keeps the substitution exit-0 when no struck-N
            # labels exist (grep -oE exits 1 on no match, which would
            # otherwise trip pipefail + the YAML-implicit set -e).
            STRIKES=$( (gh issue view "$NEXT" --json labels -q '.labels[].name' \
              | grep -oE 'pipeline:struck-[0-9]+' \
              | grep -oE '[0-9]+$' \
              | sort -nr | head -1) || echo 0 )
            STRIKES=${STRIKES:-0}
            PIPELINE_AGENT_TIMEOUT_SEC=$((600 * (STRIKES + 1)))

            # Don't start an iteration that can't finish before the job
            # timeout. Defer to the next cron tick once the budget is gone,
            # and clamp this iteration's agent timeout to the time left so
            # its `timeout` always expires before the job is killed.
            REMAINING=$((DRAIN_BUDGET_SEC - SECONDS))
            if (( REMAINING <= 60 )); then
              echo "manager: drain budget spent (${SECONDS}s of ${DRAIN_BUDGET_SEC}s); deferring #$NEXT to next cron tick"
              break
            fi
            if (( PIPELINE_AGENT_TIMEOUT_SEC > REMAINING )); then
              PIPELINE_AGENT_TIMEOUT_SEC=$REMAINING
            fi
            export PIPELINE_AGENT_TIMEOUT_SEC
            # Attempt = rework counter (reviewer-driven); Strikes = dispatch-failure
            # counter (manager.sh non-zero exit). Logged together so the timeout
            # value reads correctly -- it scales with strikes, not attempts.
            # Attempt is the value before any rework increment in manager.sh below.
            ATTEMPT="$(scripts/get-field.sh "$NEXT" "Attempt" 2>/dev/null || echo 0)"
            ATTEMPT=${ATTEMPT:-0}
            echo "manager: #$NEXT attempt=$ATTEMPT strikes=$STRIKES; PIPELINE_AGENT_TIMEOUT_SEC=$PIPELINE_AGENT_TIMEOUT_SEC"

            # Reset to a clean develop checkout before handing off. The
            # prior iteration's manager.sh may have failed mid-edit --
            # especially an agent timeout (exit 124) -- leaving uncommitted
            # changes, or left the tree on another branch (prod-release.sh
            # checks out main). Without this, create-branch.sh's
            # pl_require_clean_tree guard strikes THIS ticket for the
            # previous ticket's mess. All real agent work is committed and
            # pushed to origin branches, so discarding local tree state is
            # safe. `git clean -fd` (no -x) keeps gitignored node_modules.
            git reset --hard --quiet || true
            git clean -fd --quiet || true
            git checkout --quiet develop || true
            rm -f "${PIPELINE_INVOCATION_SENTINEL:-/tmp/pipeline-last-invoked-ticket}"

            if scripts/manager.sh "$NEXT"; then
              # Successful advancement. Clear any prior strikes (no-op
              # if there were none) so transient failures don't keep
              # accumulating across long-lived tickets.
              scripts/clear-strikes.sh "$NEXT" || true
            else
              RC=$?
              # RC=75 is the _agent-claude.sh sentinel for Claude plan
              # quota exhaustion (CLAUDE_CODE_OAUTH_TOKEN). The in-flight
              # ticket's status is unchanged (set -e aborted the wrapper
              # before the status-advance call), so the next cron tick
              # will re-dispatch the same step once the plan resets.
              # Do NOT strike: this is a transient external condition,
              # not a ticket-specific failure.
              if [[ $RC -eq 75 ]]; then
                echo "manager: #$NEXT bail without strike -- claude plan quota exhausted; aborting drain"
                gh issue comment "$NEXT" --body "[manager:paused] Drain aborted at $(date -u +%Y-%m-%dT%H:%M:%SZ) -- Claude plan quota exhausted (CLAUDE_CODE_OAUTH_TOKEN). Ticket state unchanged; next cron tick will retry once the plan window resets. Workflow run: ${GH_RUN_ID}" || true
                break
              fi
              echo "manager: #$NEXT advancement failed (exit $RC); striking"
              STRIKE_RC=0
              scripts/strike-ticket.sh "$NEXT" "manager.sh exit $RC at $(date -u +%Y-%m-%dT%H:%M:%SZ); see workflow run ${GH_RUN_ID}" --expected-invocation-ticket "$NEXT" || STRIKE_RC=$?
              if [[ $STRIKE_RC -ne 0 ]]; then
                echo "manager: strike guard fired for #$NEXT (invocation banner named a different ticket); aborting drain" >&2
                exit $STRIKE_RC
              fi
              STRUCK_THIS_DRAIN="${STRUCK_THIS_DRAIN:+$STRUCK_THIS_DRAIN|}${NEXT}"
            fi
            sleep 3
          done
