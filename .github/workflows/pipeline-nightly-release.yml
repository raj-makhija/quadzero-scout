# Pipeline Nightly Release -- batch all qa-approved tickets to prod via cherry-pick.
#
# Fires at 01:00 IST (19:30 UTC the previous day) every day. Calls
# scripts/prod-release.sh, which finds all status:qa-approved (and
# status:prod-release-blocked) tickets, cherry-picks each one's merge
# commit from develop onto main in develop merge order, and ships the
# whole batch as a single GitHub Release.
#
# The script is its own no-op detector: if there are no eligible
# tickets, or none cherry-pick cleanly, it exits 0 with a log message
# and no main-side change.
#
# Manual `pipeline:prod-release` label remains available as breakglass
# for hotfixes; this nightly job is the normal path.

name: Pipeline Nightly Release

on:
  schedule:
    - cron: '30 19 * * *'   # 01:00 IST (Asia/Kolkata, UTC+5:30)
  workflow_dispatch:        # manual override (e.g. release outside the window)

permissions:
  contents: read

concurrency:
  group: pipeline-prod-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout develop (with PAT for git ops + label edits)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.PIPELINE_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "quadzero-pipeline[bot]"
          git config user.email "pipeline-bot@users.noreply.github.com"
          git config core.hooksPath /dev/null

      - name: Verify gh + jq + aws
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: |
          gh --version
          jq --version
          aws --version

      - name: Run nightly cherry-pick batch release
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          PIPELINE_SKIP_DEPLOY: ${{ vars.PIPELINE_SKIP_DEPLOY }}
        run: scripts/prod-release.sh
