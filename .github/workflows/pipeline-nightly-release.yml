# Pipeline Nightly Release -- mirror develop -> main and ship to prod.
#
# Fires at 01:00 IST (19:30 UTC the previous day) every day. Calls
# scripts/prod-release.sh, which merges origin/develop into main, deploys
# the backend to prod, pushes main (Amplify ships the frontend), flips
# every status:qa-approved ticket to status:released, and cuts a single
# dated GitHub Release. In the branch-isolated model develop contains only
# qa-approved work, so this is a straight mirror -- no cherry-pick.
#
# The script is its own no-op detector: if develop has no commits beyond
# main, it exits 0 with a log message and no main-side change.
#
# Manual `pipeline:prod-release` label remains available as break-glass to
# run the mirror immediately; this nightly job is the normal path.

name: Pipeline Nightly Release

on:
  schedule:
    - cron: '30 19 * * *'   # 01:00 IST (Asia/Kolkata, UTC+5:30)
  workflow_dispatch:        # manual override (e.g. release outside the window)

permissions:
  contents: read

concurrency:
  group: pipeline-prod-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PIPELINE_APP_ID }}
          private-key: ${{ secrets.PIPELINE_APP_PRIVATE_KEY }}

      - name: Checkout develop (with App token for git ops + label edits)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name  "quadzero-pipeline[bot]"
          git config user.email "pipeline-bot@users.noreply.github.com"
          git config core.hooksPath /dev/null

      - name: Verify gh + jq + aws
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh --version
          jq --version
          aws --version

      - name: Run nightly cherry-pick batch release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          PIPELINE_SKIP_DEPLOY: ${{ vars.PIPELINE_SKIP_DEPLOY }}
        run: scripts/prod-release.sh
