# Pipeline Commands -- human-in-the-loop operations triggered by labels.
#
# Add a `pipeline:<command>` label to a ticket to trigger the corresponding
# action. The workflow auto-removes the label after success so the action
# can be re-fired. All command results post a comment on the ticket for
# audit trail.
#
# Available commands:
#   pipeline:qa-deploy     -- deploy ticket's merge SHA to QA
#   pipeline:qa-approve    -- advance frontier to merge SHA
#   pipeline:qa-reject     -- reject; route to rework. Reason from latest non-bracket comment
#   pipeline:prod-release  -- ship merge SHA to main (must be at or before frontier)
#   pipeline:approve-cost  -- unblock cost-review-pending ticket
#   pipeline:reject-cost   -- reject cost change; park at needs-human. Reason from comment
#   pipeline:retry         -- reset to rework, Attempt=1, kick pipeline-manager
#   pipeline:park          -- halt processing; set Pipeline Status=needs-human
#   pipeline:show-status   -- bot replies with current ticket state
#
# For commands that need a reason (qa-reject, reject-cost): write the reason
# as a normal issue comment FIRST, then add the label. The workflow reads
# the most recent comment that doesn't start with `[` (i.e. not a bot/marker
# comment) and uses it as the reason.

name: Pipeline Commands

on:
  issues:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: pipeline-commands-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  route:
    # Explicit allowlist of human-trigger pipeline:* labels. Other
    # pipeline:* labels (e.g. pipeline:awaiting-type, pipeline:struck-*)
    # are state markers set by the pipeline itself and must NOT trigger
    # this workflow -- otherwise they'd hit the unknown-command default,
    # get auto-removed, and generate spurious failure runs.
    if: |
      github.event.label.name == 'pipeline:qa-deploy' ||
      github.event.label.name == 'pipeline:qa-approve' ||
      github.event.label.name == 'pipeline:qa-reject' ||
      github.event.label.name == 'pipeline:prod-release' ||
      github.event.label.name == 'pipeline:approve-cost' ||
      github.event.label.name == 'pipeline:reject-cost' ||
      github.event.label.name == 'pipeline:retry' ||
      github.event.label.name == 'pipeline:park' ||
      github.event.label.name == 'pipeline:show-status'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.PIPELINE_APP_ID }}
          private-key: ${{ secrets.PIPELINE_APP_PRIVATE_KEY }}

      - name: Checkout develop (with App token for git ops + label edits)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name  "quadzero-pipeline[bot]"
          git config user.email "pipeline-bot@users.noreply.github.com"
          git config core.hooksPath /dev/null

      - name: Verify gh + jq
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh --version
          jq --version

      # The Claude Code CLI is only needed by the scribe agent on the
      # qa-approve path. Every other command (show-status, park, retry,
      # qa-deploy, qa-reject, approve-cost, reject-cost, prod-release) runs
      # no agent, so we skip the install entirely for them.
      - name: Configure npm global prefix (cacheable path)
        if: github.event.label.name == 'pipeline:qa-approve'
        run: |
          npm config set prefix "$HOME/.npm-global"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Cache Claude Code CLI
        if: github.event.label.name == 'pipeline:qa-approve'
        id: claude-cli-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm-global
          key: claude-code-cli-${{ runner.os }}-v1

      - name: Install Claude Code CLI (needed by scribe agent on qa-approve)
        if: github.event.label.name == 'pipeline:qa-approve' && steps.claude-cli-cache.outputs.cache-hit != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude Code CLI
        if: github.event.label.name == 'pipeline:qa-approve'
        run: claude --version

      - name: Route command
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # User PAT for the user-owned Projects v2 board; App tokens can't read
          # or write it. get-field.sh / set-field.sh / pl_pr_for_ticket switch to
          # this for board API calls only (see pl_use_project_token).
          PL_PROJECT_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          TICKET: ${{ github.event.issue.number }}
          LABEL: ${{ github.event.label.name }}
          ACTOR: ${{ github.event.sender.login }}
          # AWS credentials for qa-deploy/prod-release serverless invocations.
          # Stored as repo secrets; serverless reads them from env automatically.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          # Optional repo variable: set to 1 to skip the serverless deploy on
          # qa-deploy and prod-release (frontend-only via Amplify auto-deploy).
          # Honored by qa-deploy.sh natively.
          PIPELINE_SKIP_DEPLOY: ${{ vars.PIPELINE_SKIP_DEPLOY }}
          # qa-tester agent (5th pipeline agent): post-deploy, qa-deploy.sh
          # runs the documented acceptance cases against the live qa env.
          # OFF until the repo variable PIPELINE_QA_TESTER_AGENT is set to
          # `claude` AND the QA_TEST_* account secret below is provisioned.
          # PIPELINE_QA_TESTER_AUTOREJECT defaults to true (FAIL -> qa-reject);
          # set it to `false` for a report-only rollout.
          PIPELINE_QA_TESTER_AGENT: ${{ vars.PIPELINE_QA_TESTER_AGENT }}
          PIPELINE_QA_TESTER_AUTOREJECT: ${{ vars.PIPELINE_QA_TESTER_AUTOREJECT }}
          PIPELINE_QA_FRONTEND_URL: ${{ vars.PIPELINE_QA_FRONTEND_URL }}
          # Claude auth for the qa-tester agent (subscription token, as used
          # by the other pipeline agents).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Seeded QA account the agent uses to exercise authenticated flows.
          # If unset, the agent marks auth-required items UNVERIFIABLE.
          QA_TEST_USER: ${{ secrets.QA_TEST_USER }}
          QA_TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}
        run: |
          set -euo pipefail

          # Helper: most recent non-bracket comment (treated as user's reason).
          # Bot/marker comments all start with `[` (e.g. [manager], [tester:...],
          # [pr-reviewer], [/qa-deploy], [cost-approved]).
          latest_user_comment() {
            gh issue view "$TICKET" --json comments \
              -q '.comments | reverse | map(select(.body | startswith("[") | not)) | .[0].body // empty' \
              2>/dev/null || echo ""
          }

          # Helpers: post result + always remove the trigger label so the
          # command can be re-fired.
          finish_success() {
            gh issue comment "$TICKET" --body "$1" >&2
            gh issue edit "$TICKET" --remove-label "$LABEL" >&2
          }
          finish_error() {
            gh issue comment "$TICKET" --body "$1" >&2
            gh issue edit "$TICKET" --remove-label "$LABEL" >&2
            exit 1
          }

          echo "==> routing $LABEL on ticket #$TICKET (actor: @$ACTOR)" >&2

          case "$LABEL" in
            # ----------------------------------------------------- promotion
            pipeline:qa-deploy)
              # qa-deploy.sh takes the TICKET (not a SHA). It owns the
              # single-tenant lock check, the develop merge-in, the
              # regression gate, the qa-branch push + serverless deploy,
              # status:in-qa on success, and ALL result comments (success,
              # single-tenant refusal, and the not-green -> rework path).
              # The workflow just runs it and always removes the trigger
              # label so the command can be re-fired.
              if scripts/qa-deploy.sh "$TICKET"; then
                gh issue edit "$TICKET" --remove-label "$LABEL" >&2
              else
                gh issue edit "$TICKET" --remove-label "$LABEL" >&2
                exit 1
              fi
              ;;

            pipeline:qa-approve)
              # qa-approve.sh now takes a ticket number, not a SHA. It's
              # a thin marker -- sets status:qa-approved. The actual
              # cherry-pick onto main happens at the nightly batch.
              if scripts/qa-approve.sh "$TICKET"; then
                # Run the scribe agent to capture doc impact. Best-effort:
                # any failure is logged on the ticket but does NOT block
                # the approval (which has already happened).
                CLAUDE_CODE_OAUTH_TOKEN="${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" \
                  scripts/scribe.sh "$TICKET" || true
                finish_success "[/qa-approve] OK -- @$ACTOR approved #$TICKET. Squash-merged to develop; the QA lock is released so the next ticket can deploy. It ships to prod at tonight's develop->main mirror (01:00 IST)."
              else
                finish_error "[/qa-approve] FAIL -- qa-approve errored. Check workflow logs (likely the ticket has no merged PR yet)."
              fi
              ;;

            pipeline:qa-reject)
              # No merge SHA needed: the PR is still open (not merged) in
              # the branch-isolated model. qa-reject.sh resets qa->develop,
              # closes the PR, and routes the ticket to rework.
              REASON="$(latest_user_comment)"
              [[ -z "$REASON" ]] && finish_error "[/qa-reject] no reason found in recent comments. Please write the reason in a comment first, then re-add this label."
              if scripts/qa-reject.sh "$TICKET" "$REASON"; then
                finish_success "[/qa-reject] OK -- QA reset to develop; #$TICKET re-opened and routed to rework. Reason captured from @$ACTOR's comment."
              else
                finish_error "[/qa-reject] FAIL -- qa-reject errored."
              fi
              ;;

            pipeline:prod-release)
              # Break-glass: run the develop->main mirror NOW instead of
              # waiting for the nightly window. Not per-ticket -- it ships
              # everything currently qa-approved on develop. Takes no args.
              if scripts/prod-release.sh; then
                finish_success "[/prod-release] OK -- @$ACTOR triggered an immediate develop->main mirror. Everything qa-approved on develop is now on prod."
              else
                finish_error "[/prod-release] FAIL -- prod-release errored. Check the workflow run logs."
              fi
              ;;

            # ----------------------------------------------------- cost gate
            pipeline:approve-cost)
              # Post the [cost-approved] marker that the developer agent
              # prompt looks for to bypass the cost gate on next dispatch.
              gh issue comment "$TICKET" --body "[cost-approved] approved by @$ACTOR via \`pipeline:approve-cost\` label." >&2
              scripts/set-field.sh "$TICKET" "Pipeline Status" dev-pending
              scripts/set-status.sh "$TICKET" in-progress
              gh workflow run pipeline-manager.yml >&2 || true
              finish_success "[/approve-cost] OK -- cost approved by @$ACTOR. Ticket back to \`dev-pending\`; pipeline-manager kicked. Developer agent will see the [cost-approved] marker and skip the cost gate."
              ;;

            pipeline:reject-cost)
              REASON="$(latest_user_comment)"
              [[ -z "$REASON" ]] && finish_error "[/reject-cost] no reason found in recent comments. Please write the reason in a comment first, then re-add this label."
              gh issue comment "$TICKET" --body "[/reject-cost] cost change rejected by @$ACTOR. Reason: $REASON. Parking ticket at \`needs-human\` -- requires redesign or close." >&2
              scripts/set-field.sh "$TICKET" "Pipeline Status" needs-human
              scripts/set-status.sh "$TICKET" needs-human
              gh issue edit "$TICKET" --remove-label "$LABEL" >&2
              ;;

            # ----------------------------------------------------- recovery
            pipeline:retry)
              gh issue reopen "$TICKET" >&2 2>/dev/null || echo "(issue may already be open)" >&2
              scripts/set-field.sh "$TICKET" "Attempt" 1
              scripts/set-field.sh "$TICKET" "Pipeline Status" rework
              scripts/set-field.sh "$TICKET" "Base SHA" ""
              scripts/set-field.sh "$TICKET" "PR Number" ""
              scripts/set-status.sh "$TICKET" in-progress
              # Clear any strike labels so the ticket re-enters the
              # actionable queue with a fresh failure count.
              scripts/clear-strikes.sh "$TICKET" || true
              gh workflow run pipeline-manager.yml >&2 || true
              finish_success "[/retry] OK -- ticket reopened (if closed), reset to \`rework\`, Attempt=1, Base SHA + PR Number cleared, strikes cleared by @$ACTOR. Pipeline-manager kicked."
              ;;

            pipeline:park)
              scripts/set-field.sh "$TICKET" "Pipeline Status" needs-human
              scripts/set-status.sh "$TICKET" needs-human
              finish_success "[/park] OK -- ticket parked at \`needs-human\` by @$ACTOR. Use \`pipeline:retry\` to release."
              ;;

            # -------------------------------------------------- diagnostics
            pipeline:show-status)
              S="$(scripts/get-field.sh "$TICKET" "Pipeline Status" 2>/dev/null || echo unset)"
              A="$(scripts/get-field.sh "$TICKET" "Agent" 2>/dev/null || echo unset)"
              T="$(scripts/get-field.sh "$TICKET" "Attempt" 2>/dev/null || echo unset)"
              B="$(scripts/get-field.sh "$TICKET" "Base SHA" 2>/dev/null || echo unset)"
              P="$(scripts/get-field.sh "$TICKET" "PR Number" 2>/dev/null || echo unset)"
              finish_success "[/status] Pipeline Status: \`${S:-unset}\` | Agent: \`${A:-unset}\` | Attempt: \`${T:-unset}\` | Base SHA: \`${B:-unset}\` | PR Number: \`${P:-unset}\`"
              ;;

            # ----------------------------------------------------- unknown
            *)
              finish_error "[/$LABEL] unknown pipeline command. Recognized: qa-deploy, qa-approve, qa-reject, prod-release, approve-cost, reject-cost, retry, park, show-status."
              ;;
          esac
