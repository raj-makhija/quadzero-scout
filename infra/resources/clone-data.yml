# Clone Prod Data — prod-exclusion guards (ticket #303)
#
# The clone feature must be DEV/QA only. This file enforces the *infra* leg of
# the triple defense (UI gating + API 403 are the other two):
#   - The cloneDataWorker Lambda is conditioned out of the prod stack.
#   - The cross-stage READ-ONLY access to prod DynamoDB + prod S3 is created
#     only on dev/qa (never prod).
#
# `IsNotProd` resolves at deploy time from the deploy stage, so on a `--stage prod`
# deploy these resources are simply not created.
Conditions:
  IsNotProd:
    Fn::Not:
      - Fn::Equals:
          - ${self:provider.stage}
          - prod

Resources:
  # Gate the worker function (generated by serverless from the `cloneDataWorker`
  # function block) out of the prod deployment.
  CloneDataWorkerLambdaFunction:
    Condition: IsNotProd

  # READ-ONLY cross-stage access to prod data tables + prod resumes bucket,
  # attached to the shared Lambda execution role. Created on dev/qa only.
  # NOTE: Users-prod is intentionally absent (no prod credentials/PII).
  # Write/delete on the own-stage tables + bucket already come from the
  # base dynamoDbPolicy / s3Policy in iam.yml.
  CloneDataCrossStageReadPolicy:
    Type: AWS::IAM::Policy
    Condition: IsNotProd
    Properties:
      PolicyName: ${self:service}-${self:provider.stage}-clone-cross-stage-read
      Roles:
        - !Ref IamRoleLambdaExecution
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:Scan
              - dynamodb:Query
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/TalentProfiles-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Requirements-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Shortlists-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/SavedSearches-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/BulkImportBatches-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Clients-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/CandidateScreenings-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Prompts-prod'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/PricingConfig-prod'
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - arn:aws:s3:::quadzero-scout-resumes-prod
          - Effect: Allow
            Action:
              - s3:GetObject
            Resource:
              - arn:aws:s3:::quadzero-scout-resumes-prod/*
