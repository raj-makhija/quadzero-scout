# DynamoDB Policy
dynamoDbPolicy:
  Effect: Allow
  Action:
    - dynamodb:Query
    - dynamodb:Scan
    - dynamodb:GetItem
    - dynamodb:PutItem
    - dynamodb:UpdateItem
    - dynamodb:DeleteItem
    - dynamodb:BatchGetItem
    - dynamodb:BatchWriteItem
  Resource:
    - !GetAtt TalentProfilesTable.Arn
    - !Sub '${TalentProfilesTable.Arn}/index/*'
    - !GetAtt UsersTable.Arn
    - !Sub '${UsersTable.Arn}/index/*'
    - !GetAtt SavedSearchesTable.Arn
    - !Sub '${SavedSearchesTable.Arn}/index/*'
    - !GetAtt PromptsTable.Arn
    - !Sub '${PromptsTable.Arn}/index/*'
    - !GetAtt BulkImportBatchesTable.Arn
    - !GetAtt RequirementsTable.Arn
    - !Sub '${RequirementsTable.Arn}/index/*'
    - !GetAtt PricingConfigTable.Arn
    - !GetAtt ShortlistsTable.Arn
    - !Sub '${ShortlistsTable.Arn}/index/*'
    - !GetAtt ClientsTable.Arn
    - !Sub '${ClientsTable.Arn}/index/*'
    - !GetAtt CandidateScreeningsTable.Arn
    - !GetAtt EmailIngestLogTable.Arn
    - !GetAtt AuditLogTable.Arn
    - !Sub '${AuditLogTable.Arn}/index/*'
    - !GetAtt ScreeningLocksTable.Arn
    - !GetAtt SubVendorsTable.Arn
    - !Sub '${SubVendorsTable.Arn}/index/*'
    - !GetAtt PipelineActivityTable.Arn

# S3 Policy
s3Policy:
  Effect: Allow
  Action:
    - s3:GetObject
    - s3:PutObject
    - s3:DeleteObject
    - s3:GetObjectAttributes
    - s3:ListBucket
  Resource:
    - !Sub '${ResumesBucket.Arn}/*'
    - !GetAtt ResumesBucket.Arn

# Lambda Invoke Policy (for async worker invocation)
lambdaInvokePolicy:
  Effect: Allow
  Action:
    - lambda:InvokeFunction
  Resource:
    - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${self:service}-${self:provider.stage}-formatResumeWorker'
    - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${self:service}-${self:provider.stage}-bulkImportWorker'
    - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${self:service}-${self:provider.stage}-notifyWorker'

# SES Policy (for sending notification emails)
sesPolicy:
  Effect: Allow
  Action:
    - ses:SendEmail
    - ses:SendRawEmail
  Resource:
    - !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*'
    - !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:configuration-set/*'

# Textract Policy (OCR fallback for scanned PDF resumes)
textractPolicy:
  Effect: Allow
  Action:
    - textract:StartDocumentTextDetection
    - textract:GetDocumentTextDetection
  Resource: '*'

# SSM Parameter Store Policy
ssmPolicy:
  Effect: Allow
  Action:
    - ssm:GetParameter
    - ssm:GetParameters
  Resource:
    - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/quadzero-scout/${self:provider.stage}/*'
