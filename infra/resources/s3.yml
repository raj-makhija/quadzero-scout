Resources:
  # Resumes S3 Bucket
  ResumesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: ${self:custom.resumesBucket}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ${self:custom.corsOrigins.${self:provider.stage}}
            AllowedMethods:
              - PUT
              - GET
              - HEAD
            AllowedHeaders:
              - '*'
            MaxAge: 3000
            ExposedHeaders:
              - ETag
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 365
          - Id: ExpireOldFiles
            Status: Enabled
            ExpirationInDays: 2555
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # Backups S3 Bucket (ticket #167) — nightly DynamoDB exports + resume copies.
  # 30-day lifecycle expiry bounds storage cost.
  BackupsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: ${self:custom.backupsBucket}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldSnapshots
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # Bucket Policy for secure access
  ResumesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ResumesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ResumesBucket.Arn
              - !Sub '${ResumesBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  BackupsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BackupsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt BackupsBucket.Arn
              - !Sub '${BackupsBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

Outputs:
  ResumesBucketName:
    Description: Resumes bucket name
    Value: !Ref ResumesBucket
    Export:
      Name: ${self:provider.stage}-ResumesBucketName

  ResumesBucketArn:
    Description: Resumes bucket ARN
    Value: !GetAtt ResumesBucket.Arn
    Export:
      Name: ${self:provider.stage}-ResumesBucketArn

  BackupsBucketName:
    Description: Backups bucket name
    Value: !Ref BackupsBucket
    Export:
      Name: ${self:provider.stage}-BackupsBucketName
