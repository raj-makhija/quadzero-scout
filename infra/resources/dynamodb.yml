Resources:
  # TalentProfiles Table
  TalentProfilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.talentProfilesTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: candidate_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: seniority
          AttributeType: S
        - AttributeName: experience_bucket
          AttributeType: S
        - AttributeName: last_updated
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: _type
          AttributeType: S
      KeySchema:
        - AttributeName: candidate_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: SeniorityIndex
          KeySchema:
            - AttributeName: seniority
              KeyType: HASH
            - AttributeName: last_updated
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ExperienceIndex
          KeySchema:
            - AttributeName: experience_bucket
              KeyType: HASH
            - AttributeName: last_updated
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: RecentProfilesIndex
          KeySchema:
            - AttributeName: _type
              KeyType: HASH
            - AttributeName: last_updated
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # Users Table
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.usersTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # Prompts Table (Admin Interface)
  PromptsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.promptsTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: prompt_key
          AttributeType: S
        - AttributeName: version
          AttributeType: N
      KeySchema:
        - AttributeName: prompt_key
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # SavedSearches Table (Phase 2)
  SavedSearchesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.savedSearchesTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: recruiter_id
          AttributeType: S
        - AttributeName: search_id
          AttributeType: S
      KeySchema:
        - AttributeName: recruiter_id
          KeyType: HASH
        - AttributeName: search_id
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # BulkImportBatches Table
  BulkImportBatchesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.bulkImportBatchesTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: batch_id
          AttributeType: S
      KeySchema:
        - AttributeName: batch_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # Requirements Table
  RequirementsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.requirementsTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requirement_id
          AttributeType: S
        - AttributeName: client_name_lower
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: recruiter_id
          AttributeType: S
      KeySchema:
        - AttributeName: requirement_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ClientNameIndex
          KeySchema:
            - AttributeName: client_name_lower
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: RecruiterIndex
          KeySchema:
            - AttributeName: recruiter_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # Shortlists Table
  ShortlistsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.shortlistsTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requirement_id
          AttributeType: S
        - AttributeName: candidate_id
          AttributeType: S
      KeySchema:
        - AttributeName: requirement_id
          KeyType: HASH
        - AttributeName: candidate_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CandidateIndex
          KeySchema:
            - AttributeName: candidate_id
              KeyType: HASH
            - AttributeName: requirement_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # Clients Table (Client Master)
  ClientsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.clientsTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: client_id
          AttributeType: S
        - AttributeName: client_name_lower
          AttributeType: S
      KeySchema:
        - AttributeName: client_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ClientNameLowerIndex
          KeySchema:
            - AttributeName: client_name_lower
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # SubVendors Table (Sub-Vendor Master)
  SubVendorsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.subVendorsTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sub_vendor_id
          AttributeType: S
        - AttributeName: sub_vendor_name_lower
          AttributeType: S
      KeySchema:
        - AttributeName: sub_vendor_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SubVendorNameLowerIndex
          KeySchema:
            - AttributeName: sub_vendor_name_lower
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # PricingConfig Table
  PricingConfigTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.pricingConfigTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: config_key
          AttributeType: S
        - AttributeName: version
          AttributeType: N
      KeySchema:
        - AttributeName: config_key
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # CandidateScreenings Table
  CandidateScreeningsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.candidateScreeningsTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: candidate_id
          AttributeType: S
        - AttributeName: screened_at
          AttributeType: S
      KeySchema:
        - AttributeName: candidate_id
          KeyType: HASH
        - AttributeName: screened_at
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # AuditLog Table (centralized activity audit trail)
  AuditLogTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.auditLogTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: entity_key
          AttributeType: S
        - AttributeName: action_date
          AttributeType: S
        - AttributeName: log_date
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: EntityIndex
          KeySchema:
            - AttributeName: entity_key
              KeyType: HASH
            - AttributeName: sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ActionTypeIndex
          KeySchema:
            - AttributeName: action_date
              KeyType: HASH
            - AttributeName: sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: DateIndex
          KeySchema:
            - AttributeName: log_date
              KeyType: HASH
            - AttributeName: sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # ScreeningLocks Table (distributed lock for candidate screening)
  ScreeningLocksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.screeningLocksTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: candidate_id
          AttributeType: S
      KeySchema:
        - AttributeName: candidate_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # EmailIngestLog Table (idempotency log for email-based resume ingestion)
  EmailIngestLogTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.emailIngestLogTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: internet_message_id
          AttributeType: S
      KeySchema:
        - AttributeName: internet_message_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # PipelineActivity Table (tracks all pipeline events per candidate+requirement)
  PipelineActivityTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.pipelineActivityTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requirement_candidate_key
          AttributeType: S
        - AttributeName: activity_id
          AttributeType: S
      KeySchema:
        - AttributeName: requirement_candidate_key
          KeyType: HASH
        - AttributeName: activity_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

  # CandidateAttachments Table (document attachments per candidate)
  CandidateAttachmentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ${self:custom.candidateAttachmentsTable}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: candidate_id
          AttributeType: S
        - AttributeName: attachment_id
          AttributeType: S
      KeySchema:
        - AttributeName: candidate_id
          KeyType: HASH
        - AttributeName: attachment_id
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: ${self:provider.stage}
        - Key: Project
          Value: quadzero-scout

Outputs:
  TalentProfilesTableArn:
    Description: TalentProfiles table ARN
    Value: !GetAtt TalentProfilesTable.Arn
    Export:
      Name: ${self:provider.stage}-TalentProfilesTableArn

  UsersTableArn:
    Description: Users table ARN
    Value: !GetAtt UsersTable.Arn
    Export:
      Name: ${self:provider.stage}-UsersTableArn

  SavedSearchesTableArn:
    Description: SavedSearches table ARN
    Value: !GetAtt SavedSearchesTable.Arn
    Export:
      Name: ${self:provider.stage}-SavedSearchesTableArn

  PromptsTableArn:
    Description: Prompts table ARN
    Value: !GetAtt PromptsTable.Arn
    Export:
      Name: ${self:provider.stage}-PromptsTableArn

  BulkImportBatchesTableArn:
    Description: BulkImportBatches table ARN
    Value: !GetAtt BulkImportBatchesTable.Arn
    Export:
      Name: ${self:provider.stage}-BulkImportBatchesTableArn

  RequirementsTableArn:
    Description: Requirements table ARN
    Value: !GetAtt RequirementsTable.Arn
    Export:
      Name: ${self:provider.stage}-RequirementsTableArn

  ShortlistsTableArn:
    Description: Shortlists table ARN
    Value: !GetAtt ShortlistsTable.Arn
    Export:
      Name: ${self:provider.stage}-ShortlistsTableArn

  ClientsTableArn:
    Description: Clients table ARN
    Value: !GetAtt ClientsTable.Arn
    Export:
      Name: ${self:provider.stage}-ClientsTableArn

  PricingConfigTableArn:
    Description: PricingConfig table ARN
    Value: !GetAtt PricingConfigTable.Arn
    Export:
      Name: ${self:provider.stage}-PricingConfigTableArn

  CandidateScreeningsTableArn:
    Description: CandidateScreenings table ARN
    Value: !GetAtt CandidateScreeningsTable.Arn
    Export:
      Name: ${self:provider.stage}-CandidateScreeningsTableArn

  EmailIngestLogTableArn:
    Description: EmailIngestLog table ARN
    Value: !GetAtt EmailIngestLogTable.Arn
    Export:
      Name: ${self:provider.stage}-EmailIngestLogTableArn

  AuditLogTableArn:
    Description: AuditLog table ARN
    Value: !GetAtt AuditLogTable.Arn
    Export:
      Name: ${self:provider.stage}-AuditLogTableArn

  ScreeningLocksTableArn:
    Description: ScreeningLocks table ARN
    Value: !GetAtt ScreeningLocksTable.Arn
    Export:
      Name: ${self:provider.stage}-ScreeningLocksTableArn

  SubVendorsTableArn:
    Description: SubVendors table ARN
    Value: !GetAtt SubVendorsTable.Arn
    Export:
      Name: ${self:provider.stage}-SubVendorsTableArn

  PipelineActivityTableArn:
    Description: PipelineActivity table ARN
    Value: !GetAtt PipelineActivityTable.Arn
    Export:
      Name: ${self:provider.stage}-PipelineActivityTableArn

  CandidateAttachmentsTableArn:
    Description: CandidateAttachments table ARN
    Value: !GetAtt CandidateAttachmentsTable.Arn
    Export:
      Name: ${self:provider.stage}-CandidateAttachmentsTableArn
