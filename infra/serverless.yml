service: quadzero-scout

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-south-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30
  architecture: arm64
  # Disable per-function Lambda Version resources (~82 of them). This app
  # uses no aliases / provisioned concurrency / canary, and rolls back via
  # git revert + redeploy, so versions are pure overhead. Dropping them keeps
  # the template under the 500-resource CloudFormation limit, which removes
  # the need for serverless-plugin-split-stacks (whose function-grouping
  # created a root<->nested circular dependency with the HTTP API routes).
  versionFunctions: false

  stackTags:
    Project: quadzero-scout
    Environment: ${self:provider.stage}
    ManagedBy: serverless-framework

  tags:
    Project: quadzero-scout
    Environment: ${self:provider.stage}

  environment:
    STAGE: ${self:provider.stage}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
    DYNAMODB_TABLE_TALENT_PROFILES: ${self:custom.talentProfilesTable}
    DYNAMODB_TABLE_USERS: ${self:custom.usersTable}
    DYNAMODB_TABLE_SAVED_SEARCHES: ${self:custom.savedSearchesTable}
    DYNAMODB_TABLE_PROMPTS: ${self:custom.promptsTable}
    S3_BUCKET_RESUMES: ${self:custom.resumesBucket}
    LLM_PROVIDER: ${ssm:/quadzero-scout/${self:provider.stage}/LLM_PROVIDER, env:LLM_PROVIDER, 'claude'}
    ANTHROPIC_API_KEY: ${ssm:/quadzero-scout/${self:provider.stage}/ANTHROPIC_API_KEY, env:ANTHROPIC_API_KEY, ''}
    OPENAI_API_KEY: ${ssm:/quadzero-scout/${self:provider.stage}/OPENAI_API_KEY, env:OPENAI_API_KEY, ''}
    OPENROUTER_API_KEY: ${ssm:/quadzero-scout/${self:provider.stage}/OPENROUTER_API_KEY, env:OPENROUTER_API_KEY, ''}
    OPENROUTER_MODEL: ${ssm:/quadzero-scout/${self:provider.stage}/OPENROUTER_MODEL, env:OPENROUTER_MODEL, 'anthropic/claude-3.5-sonnet'}
    OPENROUTER_REFERER: ${ssm:/quadzero-scout/${self:provider.stage}/OPENROUTER_REFERER, env:OPENROUTER_REFERER, 'https://quadzero-scout.com'}
    GEMINI_API_KEY: ${ssm:/quadzero-scout/${self:provider.stage}/GEMINI_API_KEY, env:GEMINI_API_KEY, ''}
    GEMINI_MODEL: ${ssm:/quadzero-scout/${self:provider.stage}/GEMINI_MODEL, env:GEMINI_MODEL, 'gemini-2.0-flash'}
    LLM_FALLBACK_PROVIDER: ${ssm:/quadzero-scout/${self:provider.stage}/LLM_FALLBACK_PROVIDER, env:LLM_FALLBACK_PROVIDER, ''}
    USD_TO_INR_RATE: ${ssm:/quadzero-scout/${self:provider.stage}/USD_TO_INR_RATE, env:USD_TO_INR_RATE, '85'}
    NEXTAUTH_SECRET: ${ssm:/quadzero-scout/${self:provider.stage}/NEXTAUTH_SECRET, env:NEXTAUTH_SECRET, ''}
    FORMAT_RESUME_WORKER_NAME: ${self:service}-${self:provider.stage}-formatResumeWorker
    DYNAMODB_TABLE_BULK_IMPORT_BATCHES: ${self:custom.bulkImportBatchesTable}
    BULK_IMPORT_WORKER_NAME: ${self:service}-${self:provider.stage}-bulkImportWorker
    NOTIFY_WORKER_NAME: ${self:service}-${self:provider.stage}-notifyWorker
    LLM_RERANK_WORKER_NAME: ${self:service}-${self:provider.stage}-llmRerankWorker
    LLM_RERANK_ENABLED: ${ssm:/quadzero-scout/${self:provider.stage}/LLM_RERANK_ENABLED, env:LLM_RERANK_ENABLED, 'false'}
    SES_SENDER_EMAIL: ${ssm:/quadzero-scout/${self:provider.stage}/SES_SENDER_EMAIL, env:SES_SENDER_EMAIL, ''}
    FRONTEND_BASE_URL: ${ssm:/quadzero-scout/${self:provider.stage}/FRONTEND_BASE_URL, env:FRONTEND_BASE_URL, 'https://dev.scout.quadzero.com'}
    DYNAMODB_TABLE_REQUIREMENTS: ${self:custom.requirementsTable}
    DYNAMODB_TABLE_PRICING_CONFIG: ${self:custom.pricingConfigTable}
    DYNAMODB_TABLE_SHORTLISTS: ${self:custom.shortlistsTable}
    DYNAMODB_TABLE_CLIENTS: ${self:custom.clientsTable}
    DYNAMODB_TABLE_CANDIDATE_SCREENINGS: ${self:custom.candidateScreeningsTable}
    DYNAMODB_TABLE_EMAIL_INGEST_LOG: ${self:custom.emailIngestLogTable}
    DYNAMODB_TABLE_AUDIT_LOG: ${self:custom.auditLogTable}
    DYNAMODB_TABLE_SCREENING_LOCKS: ${self:custom.screeningLocksTable}
    DYNAMODB_TABLE_SUB_VENDORS: ${self:custom.subVendorsTable}
    DYNAMODB_TABLE_PIPELINE_ACTIVITY: ${self:custom.pipelineActivityTable}
    DYNAMODB_TABLE_CANDIDATE_ATTACHMENTS: ${self:custom.candidateAttachmentsTable}
    DYNAMODB_TABLE_RECRUITER_TASKS: ${self:custom.recruiterTasksTable}
    DYNAMODB_TABLE_REQUIREMENT_MATCH_CACHE: ${self:custom.requirementMatchCacheTable}
    DYNAMODB_TABLE_REQUIREMENT_LLM_RERANK: ${self:custom.requirementLlmRerankTable}
    DYNAMODB_TABLE_CLONE_JOBS: ${self:custom.cloneJobsTable}
    CLONE_DATA_WORKER_NAME: ${self:service}-${self:provider.stage}-cloneDataWorker
    GRAPH_TENANT_ID: ${ssm:/quadzero-scout/${self:provider.stage}/GRAPH_TENANT_ID, env:GRAPH_TENANT_ID, ''}
    GRAPH_CLIENT_ID: ${ssm:/quadzero-scout/${self:provider.stage}/GRAPH_CLIENT_ID, env:GRAPH_CLIENT_ID, ''}
    GRAPH_CLIENT_SECRET: ${ssm:/quadzero-scout/${self:provider.stage}/GRAPH_CLIENT_SECRET, env:GRAPH_CLIENT_SECRET, ''}
    GRAPH_MAILBOX_ADDRESS: ${ssm:/quadzero-scout/${self:provider.stage}/GRAPH_MAILBOX_ADDRESS, env:GRAPH_MAILBOX_ADDRESS, ''}
    EMAIL_INGEST_ENABLED: ${ssm:/quadzero-scout/${self:provider.stage}/EMAIL_INGEST_ENABLED, env:EMAIL_INGEST_ENABLED, 'false'}
    EMAIL_INGEST_NOTIFY_ADDRESS: ${ssm:/quadzero-scout/${self:provider.stage}/EMAIL_INGEST_NOTIFY_ADDRESS, env:EMAIL_INGEST_NOTIFY_ADDRESS, ''}
    RECRUITER_MATCH_EMAIL_ENABLED: ${ssm:/quadzero-scout/${self:provider.stage}/RECRUITER_MATCH_EMAIL_ENABLED, env:RECRUITER_MATCH_EMAIL_ENABLED, 'false'}
    DYNAMODB_TABLE_LINKEDIN_TOKENS: ${self:custom.linkedInTokensTable}
    LINKEDIN_CLIENT_ID: ${ssm:/quadzero-scout/${self:provider.stage}/LINKEDIN_CLIENT_ID, env:LINKEDIN_CLIENT_ID, ''}
    LINKEDIN_CLIENT_SECRET: ${ssm:/quadzero-scout/${self:provider.stage}/LINKEDIN_CLIENT_SECRET, env:LINKEDIN_CLIENT_SECRET, ''}
    LINKEDIN_REDIRECT_URI: ${ssm:/quadzero-scout/${self:provider.stage}/LINKEDIN_REDIRECT_URI, env:LINKEDIN_REDIRECT_URI, ''}
    LINKEDIN_API_VERSION: ${ssm:/quadzero-scout/${self:provider.stage}/LINKEDIN_API_VERSION, env:LINKEDIN_API_VERSION, '202505'}
    IMAGE_GEN_MODEL: ${ssm:/quadzero-scout/${self:provider.stage}/IMAGE_GEN_MODEL, env:IMAGE_GEN_MODEL, 'gpt-image-1'}
    IMAGE_GEN_SIZE: ${ssm:/quadzero-scout/${self:provider.stage}/IMAGE_GEN_SIZE, env:IMAGE_GEN_SIZE, '1024x1024'}

  httpApi:
    cors:
      allowedOrigins: ${self:custom.corsOrigins.${self:provider.stage}}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

  iam:
    role:
      statements:
        - ${file(resources/iam.yml):dynamoDbPolicy}
        - ${file(resources/iam.yml):s3Policy}
        - ${file(resources/iam.yml):lambdaInvokePolicy}
        - ${file(resources/iam.yml):ssmPolicy}
        - ${file(resources/iam.yml):sesPolicy}
        - ${file(resources/iam.yml):textractPolicy}
        - ${file(resources/iam.yml):cloudwatchMetricsPolicy}

custom:
  corsOrigins:
    dev:
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:3002
      - https://dev.scout.quadzero.com
      - https://develop.d29qw5nnt7ayr2.amplifyapp.com
    qa:
      - https://qa.scout.quadzero.com
      - https://qa.d29qw5nnt7ayr2.amplifyapp.com
    prod:
      - https://scout.quadzero.com
      - https://app.quadzero.com
      - https://main.d29qw5nnt7ayr2.amplifyapp.com

  talentProfilesTable: TalentProfiles-${self:provider.stage}
  usersTable: Users-${self:provider.stage}
  savedSearchesTable: SavedSearches-${self:provider.stage}
  promptsTable: Prompts-${self:provider.stage}
  resumesBucket: quadzero-scout-resumes-${self:provider.stage}
  bulkImportBatchesTable: BulkImportBatches-${self:provider.stage}
  requirementsTable: Requirements-${self:provider.stage}
  pricingConfigTable: PricingConfig-${self:provider.stage}
  shortlistsTable: Shortlists-${self:provider.stage}
  clientsTable: Clients-${self:provider.stage}
  candidateScreeningsTable: CandidateScreenings-${self:provider.stage}
  emailIngestLogTable: EmailIngestLog-${self:provider.stage}
  auditLogTable: AuditLog-${self:provider.stage}
  screeningLocksTable: ScreeningLocks-${self:provider.stage}
  subVendorsTable: SubVendors-${self:provider.stage}
  pipelineActivityTable: PipelineActivity-${self:provider.stage}
  candidateAttachmentsTable: CandidateAttachments-${self:provider.stage}
  recruiterTasksTable: RecruiterTasks-${self:provider.stage}
  requirementMatchCacheTable: RequirementMatchCache-${self:provider.stage}
  requirementLlmRerankTable: RequirementLlmRerank-${self:provider.stage}
  cloneJobsTable: CloneJobs-${self:provider.stage}
  retentionPolicy:
    prod: Retain
    default: Delete
  linkedInTokensTable: LinkedInTokens-${self:provider.stage}

  dotenv:
    include:
      - LLM_PROVIDER
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - OPENROUTER_MODEL
      - OPENROUTER_REFERER
      - GEMINI_API_KEY
      - GEMINI_MODEL
      - LLM_FALLBACK_PROVIDER
      - USD_TO_INR_RATE
      - NEXTAUTH_SECRET

  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    exclude:
      - '@aws-sdk/*'
      - '@sparticuz/chromium'
    target: node20
    platform: node
    concurrency: 10

  # Ticket #209 added serverless-plugin-split-stacks to bypass the 500-resource
  # CloudFormation limit, but its function-grouping put Lambda functions in
  # nested stacks while the HTTP API routes/integrations stayed in root,
  # creating a circular dependency. With versionFunctions:false (above) the
  # template drops to ~445 resources — under the 500 limit — so split-stacks
  # is no longer needed and has been removed (single root stack, no cycle).

plugins:
  - serverless-dotenv-plugin
  - serverless-esbuild
  - serverless-offline

package:
  individually: true

layers:
  chromium:
    path: layers/chromium
    name: ${self:service}-${self:provider.stage}-chromium
    description: Chromium binary for PDF generation
    compatibleRuntimes:
      - nodejs20.x
    compatibleArchitectures:
      - x86_64

functions:
  # Auth Endpoints
  authRegister:
    handler: src/handlers/auth/register.handler
    events:
      - httpApi:
          path: /auth/register
          method: POST

  authLogin:
    handler: src/handlers/auth/login.handler
    events:
      - httpApi:
          path: /auth/login
          method: POST

  # Candidate Endpoints
  candidateUploadUrl:
    handler: src/handlers/candidate/uploadUrl.handler
    events:
      - httpApi:
          path: /candidate/upload-url
          method: POST

  candidateAnalyze:
    handler: src/handlers/candidate/analyze.handler
    timeout: 60
    memorySize: 1024
    url:
      cors:
        allowedOrigins:
          - '*'
        allowedHeaders:
          - Content-Type
        allowedMethods:
          - POST
    events:
      - httpApi:
          path: /candidate/analyze
          method: POST

  candidateUploadAndAnalyze:
    handler: src/handlers/candidate/uploadAndAnalyze.handler
    timeout: 120
    memorySize: 1024
    events:
      - httpApi:
          path: /candidate/upload-and-analyze
          method: POST

  # candidateCheckDuplicate: removed — handler file does not exist
  # (stale reference from a previous commit; candidate duplicate check
  #  is handled by recruiter/checkDuplicate instead)

  candidateSaveProfile:
    handler: src/handlers/candidate/saveProfile.handler
    events:
      - httpApi:
          path: /candidate/save-profile
          method: POST

  candidateGetProfile:
    handler: src/handlers/candidate/getProfile.handler
    events:
      - httpApi:
          path: /candidate/profile/{candidateId}
          method: GET

  # Recruiter Endpoints
  recruiterParseJd:
    handler: src/handlers/recruiter/parseJd.handler
    timeout: 45
    events:
      - httpApi:
          path: /recruiter/parse-jd
          method: POST

  recruiterSearch:
    handler: src/handlers/recruiter/search.handler
    events:
      - httpApi:
          path: /recruiter/search
          method: POST

  recruiterResumeUrl:
    handler: src/handlers/recruiter/resumeUrl.handler
    timeout: 60
    memorySize: 1024
    events:
      - httpApi:
          path: /recruiter/resume-url/{candidateId}
          method: GET

  recruiterOriginalResumeUrl:
    handler: src/handlers/recruiter/originalResumeUrl.handler
    events:
      - httpApi:
          path: /recruiter/original-resume-url/{candidateId}
          method: GET

  recruiterSearchCandidatesByName:
    handler: src/handlers/recruiter/searchCandidatesByName.handler
    events:
      - httpApi:
          path: /recruiter/candidates/search
          method: GET

  recruiterGetCandidateShortlistedRequirements:
    handler: src/handlers/recruiter/getCandidateShortlistedRequirements.handler
    events:
      - httpApi:
          path: /recruiter/candidates/{candidateId}/shortlisted-requirements
          method: GET

  # Worker Lambdas (no HTTP events)
  formatResumeWorker:
    handler: src/handlers/worker/formatResume.handler
    timeout: 150
    memorySize: 1536
    architecture: x86_64
    layers:
      - !Ref ChromiumLambdaLayer

  # Phase 2: Saved Searches
  recruiterSaveSearch:
    handler: src/handlers/recruiter/saveSearch.handler
    events:
      - httpApi:
          path: /recruiter/search/save
          method: POST

  recruiterGetSearches:
    handler: src/handlers/recruiter/getSearches.handler
    events:
      - httpApi:
          path: /recruiter/searches
          method: GET

  recruiterDeleteSearch:
    handler: src/handlers/recruiter/deleteSearch.handler
    events:
      - httpApi:
          path: /recruiter/search/{searchId}
          method: DELETE

  # Recruiter Requirements Endpoints
  recruiterSaveRequirement:
    handler: src/handlers/recruiter/saveRequirement.handler
    events:
      - httpApi:
          path: /recruiter/requirements
          method: POST

  recruiterListRequirements:
    handler: src/handlers/recruiter/listRequirements.handler
    events:
      - httpApi:
          path: /recruiter/requirements
          method: GET

  recruiterListRecentRequirements:
    handler: src/handlers/recruiter/listRecentRequirements.handler
    events:
      - httpApi:
          path: /recruiter/recent-requirements
          method: GET

  recruiterListRecentProfiles:
    handler: src/handlers/recruiter/listRecentProfiles.handler
    events:
      - httpApi:
          path: /recruiter/recent-profiles
          method: GET

  recruiterBenchList:
    handler: src/handlers/recruiter/benchList.handler
    events:
      - httpApi:
          path: /recruiter/bench-list
          method: GET

  recruiterBenchListEmail:
    handler: src/handlers/recruiter/benchListEmail.handler
    events:
      - httpApi:
          path: /recruiter/bench-list/email
          method: POST

  recruiterMyActivity:
    handler: src/handlers/recruiter/myActivity.handler
    events:
      - httpApi:
          path: /recruiter/my-activity
          method: GET

  recruiterGetRequirement:
    handler: src/handlers/recruiter/getRequirement.handler
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}
          method: GET

  recruiterCheckDuplicate:
    handler: src/handlers/recruiter/checkDuplicate.handler
    timeout: 45
    events:
      - httpApi:
          path: /recruiter/requirements/check-duplicate
          method: POST

  recruiterConsolidateRequirement:
    handler: src/handlers/recruiter/consolidateRequirement.handler
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}/consolidate
          method: PUT

  recruiterUpdateRequirement:
    handler: src/handlers/recruiter/updateRequirement.handler
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}/details
          method: PUT

  recruiterUpdateRequirementCriteria:
    handler: src/handlers/recruiter/updateRequirementCriteria.handler
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}/criteria
          method: PUT

  recruiterUpdateRequirementStatus:
    handler: src/handlers/recruiter/updateRequirementStatus.handler
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}/status
          method: PUT

  recruiterToggleRequirementNotify:
    handler: src/handlers/recruiter/toggleRequirementNotify.handler
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}/notify
          method: PUT

  recruiterGetClientNames:
    handler: src/handlers/recruiter/getClientNames.handler
    events:
      - httpApi:
          path: /recruiter/client-names
          method: GET

  # Client Master Endpoints
  recruiterSaveClient:
    handler: src/handlers/recruiter/saveClient.handler
    events:
      - httpApi:
          path: /recruiter/clients
          method: POST

  recruiterListClients:
    handler: src/handlers/recruiter/listClients.handler
    events:
      - httpApi:
          path: /recruiter/clients
          method: GET

  recruiterGetClientDefaults:
    handler: src/handlers/recruiter/getClientDefaults.handler
    events:
      - httpApi:
          path: /recruiter/client-defaults
          method: GET

  recruiterUpdateClient:
    handler: src/handlers/recruiter/updateClient.handler
    events:
      - httpApi:
          path: /recruiter/clients/{clientId}
          method: PUT

  # Sub-Vendor Master Endpoints
  recruiterSaveSubVendor:
    handler: src/handlers/recruiter/saveSubVendor.handler
    events:
      - httpApi:
          path: /recruiter/sub-vendors
          method: POST

  recruiterListSubVendors:
    handler: src/handlers/recruiter/listSubVendors.handler
    events:
      - httpApi:
          path: /recruiter/sub-vendors
          method: GET

  recruiterUpdateSubVendor:
    handler: src/handlers/recruiter/updateSubVendor.handler
    events:
      - httpApi:
          path: /recruiter/sub-vendors/{subVendorId}
          method: PUT

  recruiterGetSubVendorNames:
    handler: src/handlers/recruiter/getSubVendorNames.handler
    events:
      - httpApi:
          path: /recruiter/sub-vendor-names
          method: GET

  # Admin Endpoints
  adminListPendingRecruiters:
    handler: src/handlers/admin/listPendingRecruiters.handler
    events:
      - httpApi:
          path: /admin/recruiters/pending
          method: GET

  adminApproveRejectUser:
    handler: src/handlers/admin/approveRejectUser.handler
    events:
      - httpApi:
          path: /admin/users/status
          method: POST

  adminListPrompts:
    handler: src/handlers/admin/listPrompts.handler
    events:
      - httpApi:
          path: /admin/prompts
          method: GET

  adminGetPromptVersions:
    handler: src/handlers/admin/getPromptVersions.handler
    events:
      - httpApi:
          path: /admin/prompts/{promptKey}/versions
          method: GET

  adminUpdatePrompt:
    handler: src/handlers/admin/updatePrompt.handler
    events:
      - httpApi:
          path: /admin/prompts
          method: PUT

  # Admin Bulk Import
  adminBulkImportStart:
    handler: src/handlers/admin/bulkImportStart.handler
    events:
      - httpApi:
          path: /admin/bulk-import/start
          method: POST

  adminBulkImportStatus:
    handler: src/handlers/admin/bulkImportStatus.handler
    events:
      - httpApi:
          path: /admin/bulk-import/status/{batchId}
          method: GET

  adminBulkImportResume:
    handler: src/handlers/admin/bulkImportResume.handler
    events:
      - httpApi:
          path: /admin/bulk-import/resume
          method: POST

  # Bulk Import Worker (no HTTP events)
  bulkImportWorker:
    handler: src/handlers/worker/bulkImportWorker.handler
    timeout: 120
    memorySize: 1024

  # Admin Clone Prod Data (ticket #303) — DEV/QA only. The start/status handlers
  # are deployed on all stages but return 403 on prod (API guard). The worker
  # Lambda below is conditioned out of the prod stack (see resources/clone-data.yml).
  adminCloneDataStart:
    handler: src/handlers/admin/cloneDataStart.handler
    events:
      - httpApi:
          path: /admin/clone-data/start
          method: POST

  adminCloneDataStatus:
    handler: src/handlers/admin/cloneDataStatus.handler
    events:
      - httpApi:
          path: /admin/clone-data/status/{jobId}
          method: GET

  # Clone Prod Data Worker (no HTTP events) — long-running clear+scan+copy.
  cloneDataWorker:
    handler: src/handlers/worker/cloneDataWorker.handler
    timeout: 900
    memorySize: 1024

  # Notify Worker (no HTTP events)
  notifyWorker:
    handler: src/handlers/worker/notifyWorker.handler
    timeout: 60
    memorySize: 512

  # Match-cache full rebuild worker (ticket #236) — nightly EventBridge schedule.
  matchCacheRebuildWorker:
    handler: src/handlers/worker/matchCacheRebuildWorker.handler
    # Full rebuild scans ~3,500 profiles and scores them against every active
    # requirement. At 120s/512MB it timed out before any cache was written
    # (empty prod cache). Raised so the rebuild completes within budget.
    timeout: 600
    memorySize: 1536
    events:
      - schedule:
          rate: rate(1 day)
          enabled: true

  # LLM tie-break re-rank worker (ticket #239) — invoked fire-and-forget from
  # the requirement-bound search read path on a stale/cold re-rank. No events.
  llmRerankWorker:
    handler: src/handlers/worker/llmRerankWorker.handler
    timeout: 120
    memorySize: 512

  # Email Ingest Worker (scheduled, no HTTP events)
  emailIngestWorker:
    handler: src/handlers/worker/emailIngestWorker.handler
    timeout: 120
    memorySize: 1024
    events:
      - schedule:
          rate: rate(3 minutes)
          enabled: true

  # Recruiter Task Queue (ticket #153)
  # Scheduled sweep worker — generates time/condition-based POOL tasks.
  taskGeneratorWorker:
    handler: src/handlers/worker/taskGeneratorWorker.handler
    timeout: 120
    memorySize: 512
    events:
      - schedule:
          rate: rate(30 minutes)
          enabled: true

  # Task queue HTTP endpoints (single router Lambda to stay under CFN limits)
  recruiterTasks:
    handler: src/handlers/recruiter/tasksRouter.handler
    timeout: 30
    events:
      - httpApi:
          path: /recruiter/tasks
          method: GET
      - httpApi:
          path: /recruiter/tasks/{taskId}/snooze
          method: POST
      - httpApi:
          path: /recruiter/tasks/{taskId}/complete
          method: POST

  # LinkedIn Posting (ticket #442)
  recruiterLinkedIn:
    handler: src/handlers/recruiter/linkedinRouter.handler
    events:
      - httpApi:
          path: /recruiter/linkedin/auth-url
          method: GET
      - httpApi:
          path: /recruiter/linkedin/exchange
          method: POST
      - httpApi:
          path: /recruiter/linkedin/status
          method: GET
      - httpApi:
          path: /recruiter/requirements/{requirementId}/linkedin/generate
          method: POST
      - httpApi:
          path: /recruiter/requirements/{requirementId}/linkedin/post
          method: POST

  # Pricing Endpoints
  recruiterCalculatePricing:
    handler: src/handlers/recruiter/calculatePricing.handler
    events:
      - httpApi:
          path: /recruiter/pricing/calculate
          method: POST

  recruiterUpdateCandidateCtc:
    handler: src/handlers/recruiter/updateCandidateCtc.handler
    events:
      - httpApi:
          path: /recruiter/candidate-ctc
          method: PUT

  recruiterUpdateCandidateCustomFields:
    handler: src/handlers/recruiter/updateCandidateCustomFields.handler
    events:
      - httpApi:
          path: /recruiter/candidate-custom-fields
          method: PUT

  # Candidate Match Requirements
  candidateMatchRequirements:
    handler: src/handlers/candidate/matchRequirements.handler
    events:
      - httpApi:
          path: /candidate/match-requirements
          method: POST

  # Candidate Match Debug (diagnostic endpoint)
  candidateMatchDebug:
    handler: src/handlers/candidate/matchDebug.handler
    events:
      - httpApi:
          path: /candidate/match-debug
          method: POST

  # Shortlist Endpoints
  recruiterShortlistCandidate:
    handler: src/handlers/recruiter/shortlistCandidate.handler
    events:
      - httpApi:
          path: /recruiter/shortlist
          method: POST

  recruiterRemoveShortlist:
    handler: src/handlers/recruiter/removeShortlist.handler
    events:
      - httpApi:
          path: /recruiter/shortlist/{requirementId}/{candidateId}
          method: DELETE

  recruiterGetShortlistedCandidates:
    handler: src/handlers/recruiter/getShortlistedCandidates.handler
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}/shortlisted
          method: GET

  recruiterMarkNotSuitable:
    handler: src/handlers/recruiter/markNotSuitable.handler
    events:
      - httpApi:
          path: /recruiter/shortlist/not-suitable
          method: PUT

  # Pipeline Endpoints (single Lambda router to stay under CloudFormation 500 resource limit)
  recruiterPipeline:
    handler: src/handlers/recruiter/pipelineRouter.handler
    timeout: 30
    events:
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/submit
          method: POST
      - httpApi:
          path: /recruiter/requirements/{requirementId}/submit-batch
          method: POST
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/client-feedback
          method: POST
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/interviews
          method: POST
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/interview-feedback
          method: POST
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/pipeline-stage
          method: PUT
      - httpApi:
          path: /recruiter/requirements/{requirementId}/pipeline
          method: GET
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/activities
          method: GET
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/submission
          method: PUT
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/notes
          method: POST
      - httpApi:
          path: /recruiter/requirements/{requirementId}/candidates/{candidateId}/shortlist-entry
          method: GET

  # Candidate Screening Endpoints
  recruiterScreenCandidate:
    handler: src/handlers/recruiter/screenCandidate.handler
    events:
      - httpApi:
          path: /recruiter/screen-candidate
          method: POST

  recruiterGetScreeningHistory:
    handler: src/handlers/recruiter/getScreeningHistory.handler
    events:
      - httpApi:
          path: /recruiter/screening-history/{candidateId}
          method: GET

  recruiterGenerateScreeningQuestions:
    handler: src/handlers/recruiter/generateScreeningQuestions.handler
    events:
      - httpApi:
          path: /recruiter/screening-questions
          method: POST

  # Screening Lock Endpoints
  recruiterAcquireScreeningLock:
    handler: src/handlers/recruiter/acquireScreeningLock.handler
    events:
      - httpApi:
          path: /recruiter/screening-lock/acquire
          method: POST

  recruiterReleaseScreeningLock:
    handler: src/handlers/recruiter/releaseScreeningLock.handler
    events:
      - httpApi:
          path: /recruiter/screening-lock/release
          method: POST

  recruiterHeartbeatScreeningLock:
    handler: src/handlers/recruiter/heartbeatScreeningLock.handler
    events:
      - httpApi:
          path: /recruiter/screening-lock/heartbeat
          method: POST

  recruiterReleaseScreeningLockBeacon:
    handler: src/handlers/recruiter/releaseScreeningLockBeacon.handler
    events:
      - httpApi:
          path: /recruiter/screening-lock/release-beacon
          method: POST

  # Candidate Attachment Endpoints (single Lambda router)
  recruiterAttachments:
    handler: src/handlers/recruiter/attachmentRouter.handler
    events:
      - httpApi:
          path: /recruiter/candidates/{candidateId}/attachment-upload-url
          method: POST
      - httpApi:
          path: /recruiter/candidates/{candidateId}/attachments
          method: POST
      - httpApi:
          path: /recruiter/candidates/{candidateId}/attachments
          method: GET
      - httpApi:
          path: /recruiter/candidates/{candidateId}/attachments/{attachmentId}/download-url
          method: GET

  adminGetPricingConfig:
    handler: src/handlers/admin/getPricingConfig.handler
    events:
      - httpApi:
          path: /admin/pricing-config
          method: GET

  adminUpdatePricingConfig:
    handler: src/handlers/admin/updatePricingConfig.handler
    events:
      - httpApi:
          path: /admin/pricing-config
          method: PUT

  # Admin Session Settings Endpoints
  adminGetSessionSettings:
    handler: src/handlers/admin/getSessionSettings.handler
    events:
      - httpApi:
          path: /admin/session-settings
          method: GET

  adminUpdateSessionSettings:
    handler: src/handlers/admin/updateSessionSettings.handler
    events:
      - httpApi:
          path: /admin/session-settings
          method: PUT

  # Public Session Timeout Endpoint
  publicGetSessionTimeout:
    handler: src/handlers/public/getSessionTimeout.handler
    events:
      - httpApi:
          path: /public/session-timeout
          method: GET

  # Public Requirements Board Endpoints
  publicListRequirements:
    handler: src/handlers/public/listPublicRequirements.handler
    events:
      - httpApi:
          path: /public/requirements
          method: GET

  publicGetRequirement:
    handler: src/handlers/public/getPublicRequirement.handler
    events:
      - httpApi:
          path: /public/requirements/{requirementId}
          method: GET

  # Admin Audit Log Endpoints
  adminListAuditLogs:
    handler: src/handlers/admin/listAuditLogs.handler
    events:
      - httpApi:
          path: /admin/audit-logs
          method: GET

  adminGetUserAuditLogs:
    handler: src/handlers/admin/getUserAuditLogs.handler
    events:
      - httpApi:
          path: /admin/audit-logs/user/{userId}
          method: GET

  adminGetEntityAuditLogs:
    handler: src/handlers/admin/getEntityAuditLogs.handler
    events:
      - httpApi:
          path: /admin/audit-logs/entity/{entityType}/{entityId}
          method: GET

  adminActivityDashboard:
    handler: src/handlers/admin/activityDashboard.handler
    events:
      - httpApi:
          path: /admin/activity-dashboard
          method: GET

  adminListApprovedRecruiters:
    handler: src/handlers/admin/listApprovedRecruiters.handler
    events:
      - httpApi:
          path: /admin/recruiters/list
          method: GET

  # Match-cache full rebuild — manual admin trigger (ticket #236).
  adminRebuildMatchCache:
    handler: src/handlers/admin/rebuildMatchCache.handler
    timeout: 120
    memorySize: 512
    events:
      - httpApi:
          path: /admin/match-cache/rebuild
          method: POST

resources:
  - ${file(resources/dynamodb.yml)}
  - ${file(resources/s3.yml)}
  - ${file(resources/clone-data.yml)}
  - Resources:
      BulkImportWorkerLambdaFunction:
        Type: AWS::Lambda::Function
        Properties:
          RecursiveLoop: Allow
    Outputs:
      CandidateAnalyzeFunctionUrl:
        Description: Lambda Function URL for candidateAnalyze (bypasses API Gateway 30s timeout)
        Value: !GetAtt CandidateAnalyzeLambdaFunctionUrl.FunctionUrl
        Export:
          Name: ${self:service}-${self:provider.stage}-CandidateAnalyzeFunctionUrl
